  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  --ink3:      #8b93a1;\n  --bg:        #f4f5f7;\n  --surface:   #ffffff;\n  --border:    #e6e8ed;\n  --accent:    oklch(0.52 0.13 256);\n  --accent-w:  oklch(0.95 0.025 256);\n  --ok:        oklch(0.42 0.10 155);\n  --ok-w:      oklch(0.94 0.03 155);\n  --warn:      oklch(0.50 0.12 70);\n  --warn-w:    oklch(0.95 0.04 70);\n  --danger:    oklch(0.46 0.14 25);\n  --danger-w:  oklch(0.95 0.04 25);\n  --font:      \"Plus Jakarta Sans\", system-ui, sans-serif;\n  --mono:      \"JetBrains Mono\", ui-monospace, monospace;\n  --r:         10px;\n  --r-lg:      14px;\n  --sh:        0 1px 3px rgba(20,24,33,.07), 0 1px 2px rgba(20,24,33,.05);\n  --sh-lg:     0 8px 28px rgba(20,24,33,.12), 0 2px 8px rgba(20,24,33,.07);\n}\n* { box-sizing: border-box; margin: 0; padding: 0; }\nhtml { font-size: 15px; scroll-behavior: smooth; }\nbody { font-family: var(--font); color: var(--ink); background: var(--bg); -webkit-font-smoothing: antialiased; line-height: 1.55; }\n\n/* ── layout ── */\n.page { max-width: 1080px; margin: 0 auto; padding: 48px 32px 120px; }\n\n/* ── cover ── */\n.cover { background: var(--accent); border-radius: var(--r-lg); padding: 36px 40px; color: #fff; margin-bottom: 52px; display: flex; gap: 32px; align-items: flex-start; }\n.cover-logo { width: 48px; height: 48px; background: rgba(255,255,255,.18); border-radius: 14px; display: grid; place-items: center; flex: none; }\n.cover-logo svg { width: 26px; height: 26px; }\n.cover-body { flex: 1; }\n.cover h1 { font-size: 28px; font-weight: 800; letter-spacing: -.03em; margin-bottom: 6px; }\n.cover .sub { opacity: .82; font-size: 15px; max-width: 60ch; margin-bottom: 18px; }\n.cover-tags { display: flex; flex-wrap: wrap; gap: 8px; }\n.cover-tag { background: rgba(255,255,255,.18); border-radius: 100px; padding: 3px 12px; font-size: 12.5px; font-weight: 700; letter-spacing: .01em; }\n.cover-meta { display: flex; flex-direction: column; gap: 5px; text-align: right; flex: none; opacity: .8; font-size: 13px; }\n\n/* ── section ── */\n.section { margin-bottom: 64px; }\n.section-label { font-size: 11px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--ink3); margin-bottom: 14px; display: flex; align-items: center; gap: 9px; }\n.section-label::after { content: \"\"; flex: 1; height: 1px; background: var(--border); }\nh2 { font-size: 22px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 6px; }\nh3 { font-size: 17px; font-weight: 800; letter-spacing: -.01em; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }\nh4 { font-size: 13.5px; font-weight: 800; letter-spacing: .01em; text-transform: uppercase; color: var(--ink2); margin-bottom: 8px; margin-top: 20px; }\np { color: var(--ink2); font-size: 14px; max-width: 70ch; margin-bottom: 14px; line-height: 1.6; }\np:last-child { margin-bottom: 0; }\n\n/* ── fr badge ── */\n.fr { display: inline-flex; align-items: center; gap: 4px; background: var(--accent-w); color: var(--accent); border-radius: 6px; padding: 2px 8px; font-size: 12px; font-weight: 800; font-family: var(--mono); }\n\n/* ── nav flow diagram ── */\n.flow-diagram { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 28px 32px; box-shadow: var(--sh); overflow-x: auto; }\n.flow-row { display: flex; align-items: center; gap: 0; flex-wrap: nowrap; }\n.flow-node { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: none; }\n.flow-box { background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--r); padding: 9px 16px; font-size: 13px; font-weight: 700; color: var(--ink); white-space: nowrap; text-align: center; min-width: 110px; }\n.flow-box.start { border-color: var(--accent); background: var(--accent-w); color: var(--accent); }\n.flow-box.sub { font-size: 12px; background: var(--surface); min-width: 96px; padding: 7px 12px; }\n.flow-box.modal { border-style: dashed; font-size: 12px; min-width: 96px; padding: 7px 12px; }\n.flow-arrow { width: 28px; height: 2px; background: var(--border); flex: none; position: relative; }\n.flow-arrow::after { content: \"▶\"; position: absolute; right: -7px; top: -6px; font-size: 9px; color: var(--ink3); }\n.flow-arrow.down { width: 2px; height: 22px; background: var(--border); }\n.flow-arrow.down::after { content: \"▼\"; right: -6px; bottom: -9px; top: auto; }\n.flow-col { display: flex; flex-direction: column; align-items: center; gap: 0; }\n.flow-sub-row { display: flex; gap: 0; align-items: center; }\n\n/* ── screen block ── */\n.screen-block { margin-bottom: 52px; }\n.screen-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 18px; }\n.screen-num { width: 34px; height: 34px; background: var(--accent); color: #fff; border-radius: 10px; display: grid; place-items: center; font-size: 14px; font-weight: 800; flex: none; margin-top: 2px; }\n.screen-title-wrap { flex: 1; }\n.screen-title-wrap h3 { margin-bottom: 4px; }\n.screen-title-wrap .desc { color: var(--ink2); font-size: 14px; max-width: 68ch; }\n.fr-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }\n\n.screen-body { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }\n.screen-body.wide { grid-template-columns: 3fr 2fr; }\n.screen-body.full { grid-template-columns: 1fr; }\n\n/* ── screenshot ── */\n.ss-wrap { border-radius: var(--r-lg); overflow: hidden; border: 1px solid var(--border); box-shadow: var(--sh-lg); background: var(--surface); }\n.ss-wrap img { width: 100%; display: block; }\n.ss-caption { font-size: 11.5px; color: var(--ink3); font-weight: 600; padding: 7px 12px; border-top: 1px solid var(--border); background: var(--bg); }\n\n/* ── annotation cards ── */\n.annotations { display: flex; flex-direction: column; gap: 10px; }\n.anno { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 13px 14px; box-shadow: var(--sh); }\n.anno-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }\n.anno-dot { width: 20px; height: 20px; border-radius: 50%; background: var(--accent); color: #fff; display: grid; place-items: center; font-size: 10px; font-weight: 800; flex: none; }\n.anno-dot.ok { background: var(--ok); }\n.anno-dot.warn { background: var(--warn); }\n.anno-dot.danger { background: var(--danger); }\n.anno-dot.neutral { background: var(--ink3); }\n.anno-label { font-size: 13px; font-weight: 800; }\n.anno-body { font-size: 12.5px; color: var(--ink2); line-height: 1.5; }\n.anno-body code { font-family: var(--mono); font-size: 11.5px; background: var(--bg); padding: 1px 5px; border-radius: 4px; color: var(--ink); }\n.anno-body ul { padding-left: 16px; margin: 4px 0; }\n.anno-body ul li { margin-bottom: 2px; }\n\n/* ── rule table ── */\n.rule-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }\n.rule-table th { text-align: left; font-size: 11px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; color: var(--ink3); padding: 0 14px 9px; }\n.rule-table td { padding: 10px 14px; border-top: 1px solid var(--border); vertical-align: top; }\n.rule-table td:first-child { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--accent); }\n.rule-table td:nth-child(2) { font-weight: 700; }\n.rule-table td:last-child { color: var(--ink2); }\n\n/* ── interaction table ── */\n.ix-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }\n.ix-table th { text-align: left; font-size: 11px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; color: var(--ink3); padding: 0 14px 9px; }\n.ix-table td { padding: 11px 14px; border-top: 1px solid var(--border); vertical-align: top; line-height: 1.5; }\n.ix-table tr:hover td { background: var(--bg); }\n.ix-table .action { font-weight: 700; }\n.ix-table .result { color: var(--ink2); }\n\n/* ── state chips ── */\n.states { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }\n.state { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 13px; font-size: 13px; }\n.state .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }\n.state .name { font-weight: 700; }\n.state .desc { color: var(--ink2); font-size: 12px; }\n\n/* ── card wrapper ── */\n.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 20px 22px; box-shadow: var(--sh); }\n\n/* ── component spec ── */\n.comp-row { display: flex; gap: 10px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); }\n.comp-row:last-child { border-bottom: none; }\n.comp-name { width: 160px; flex: none; font-size: 13px; font-weight: 800; }\n.comp-detail { flex: 1; font-size: 12.5px; color: var(--ink2); line-height: 1.5; }\n.comp-detail code { font-family: var(--mono); font-size: 11.5px; background: var(--bg); padding: 1px 5px; border-radius: 4px; color: var(--ink); }\n\n/* ── footer ── */\n.footer { border-top: 1px solid var(--border); padding-top: 24px; color: var(--ink3); font-size: 13px; display: flex; gap: 20px; align-items: center; }\n.footer strong { color: var(--ink2); }\n\n/* ── print ── */\n@media print {\n  body { background: #fff; }\n  .page { max-width: none; padding: 24px; }\n  .cover { -webkit-print-color-adjust: exact; print-color-adjust: exact; }\n  .screen-body { break-inside: avoid; }\n}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n<div class=\"page\">\n\n<!-- ══════════════════════════════════════════════\n     COVER\n══════════════════════════════════════════════ -->\n<div class=\"cover\">\n  <div class=\"cover-logo\">\n    <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"white\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n      <path d=\"M6 3v12M18 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM15 6a9 9 0 0 1-9 9\"><\u002Fpath>\n    <\u002Fsvg>\n  <\u002Fdiv>\n  <div class=\"cover-body\">\n    <h1>Relay — Frontend Handoff<\u002Fh1>\n    <div class=\"sub\">Admin panel visual &amp; interaction spec. Covers all five product-owner screens: Login, Dashboard, Tenant list / create, Per-client config, Flow builder, and Conversation log viewer. Cross-referenced to FR tickets.<\u002Fdiv>\n    <div class=\"cover-tags\">\n      <span class=\"cover-tag\">Admin Panel only<\u002Fspan>\n      <span class=\"cover-tag\">Customers use WhatsApp / Instagram natively — no chat UI to build<\u002Fspan>\n      <span class=\"cover-tag\">FR-01 · FR-15 · FR-16 · FR-17 · FR-18<\u002Fspan>\n      <span class=\"cover-tag\">Multi-tenant · Rule-based · WhatsApp + Instagram<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"cover-meta\">\n    <span><strong>Version<\u002Fstrong> 1.0<\u002Fspan>\n    <span><strong>Date<\u002Fstrong> June 8 2026<\u002Fspan>\n    <span><strong>Status<\u002Fstrong> Ready for review<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══════════════════════════════════════════════\n     SCOPE NOTE\n══════════════════════════════════════════════ -->\n<div class=\"section\">\n  <div class=\"section-label\">Scope clarification<\u002Fdiv>\n  <div class=\"card\">\n    <h3 style=\"margin-bottom:10px\">What this spec covers — and what it doesn't<\u002Fh3>\n    <p>The <strong>only custom UI to build is the admin panel<\u002Fstrong> — the product owner's screens for managing tenants and their flows. Customers interact through WhatsApp and Instagram's own native apps; no chat UI is needed from us.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;\">\n      <div style=\"background:var(--ok-w);border-radius:var(--r);padding:14px 16px;\">\n        <div style=\"font-weight:800;color:var(--ok);margin-bottom:8px;font-size:13.5px;\">✓ In scope — build this<\u002Fdiv>\n        <ul style=\"font-size:13px;color:var(--ink2);padding-left:16px;line-height:1.8;\">\n          <li>Login screen (FR-01)<\u002Fli>\n          <li>Dashboard / overview<\u002Fli>\n          <li>Tenant list + create/edit (FR-15, FR-16)<\u002Fli>\n          <li>Per-client config: greeting, closing, handoff toggle<\u002Fli>\n          <li>Flow builder — steps, buttons, linking (FR-17)<\u002Fli>\n          <li>Conversation log viewer (FR-18)<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div style=\"background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;\">\n        <div style=\"font-weight:800;color:var(--ink3);margin-bottom:8px;font-size:13.5px;\">✗ Out of scope — platform handles it<\u002Fdiv>\n        <ul style=\"font-size:13px;color:var(--ink3);padding-left:16px;line-height:1.8;\">\n          <li>Any chat / messaging UI<\u002Fli>\n          <li>WhatsApp / Instagram client rendering<\u002Fli>\n          <li>Phone frames or simulated device views<\u002Fli>\n          <li>Customer-facing onboarding<\u002Fli>\n          <li>Agent / support inbox (handoff destination)<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══════════════════════════════════════════════\n     NAVIGATION MAP\n══════════════════════════════════════════════ -->\n<div class=\"section\">\n  <div class=\"section-label\">Navigation<\u002Fdiv>\n  <h2 style=\"margin-bottom:4px\">Screen flow<\u002Fh2>\n  <p>Linear: Login → Dashboard. From the sidebar, navigate to Clients. Any client row opens the client detail view with three tabs.<\u002Fp>\n  <div class=\"flow-diagram\" style=\"margin-top:18px;\">\n    <!-- Row 1 -->\n    <div class=\"flow-row\" style=\"margin-bottom:24px;gap:0;\">\n      <div class=\"flow-node\">\n        <div class=\"flow-box start\">Login<\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--ink3);font-weight:600;margin-top:4px;\">FR-01<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"flow-arrow\"><\u002Fdiv>\n      <div class=\"flow-node\">\n        <div class=\"flow-box\">Dashboard<\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--ink3);font-weight:600;margin-top:4px;\">Overview<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"flow-arrow\"><\u002Fdiv>\n      <div class=\"flow-node\">\n        <div class=\"flow-box\">Clients list<\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--ink3);font-weight:600;margin-top:4px;\">FR-15<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"flow-arrow\"><\u002Fdiv>\n      <div class=\"flow-col\">\n        <div class=\"flow-row\" style=\"gap:0;\">\n          <div class=\"flow-node\">\n            <div class=\"flow-box\">Client detail<\u002Fdiv>\n            <div style=\"font-size:11px;color:var(--ink3);font-weight:600;margin-top:4px;\">3 tabs below<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Tabs row -->\n    <div style=\"margin-left:446px;display:flex;gap:12px;align-items:flex-start;\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;\">\n        <div style=\"width:2px;height:18px;background:var(--border)\"><\u002Fdiv>\n        <div class=\"flow-box sub\" style=\"border-color:var(--accent);background:var(--accent-w);color:var(--accent);\">Settings<\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--ink3);font-weight:600;\">FR-05 / FR-11<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;\">\n        <div style=\"width:2px;height:18px;background:var(--border)\"><\u002Fdiv>\n        <div class=\"flow-box sub\" style=\"border-color:var(--accent);background:var(--accent-w);color:var(--accent);\">Flow builder<\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--ink3);font-weight:600;\">FR-17<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;\">\n        <div style=\"width:2px;height:18px;background:var(--border)\"><\u002Fdiv>\n        <div class=\"flow-box sub\" style=\"border-color:var(--accent);background:var(--accent-w);color:var(--accent);\">Conversations<\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--ink3);font-weight:600;\">FR-18<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;margin-left:24px;\">\n        <div style=\"width:2px;height:18px;background:var(--border)\"><\u002Fdiv>\n        <div class=\"flow-box modal\">+ New client modal<\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--ink3);font-weight:600;\">FR-16 · from list<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:20px;padding-top:16px;border-top:1px solid var(--border);font-size:12px;color:var(--ink3);\">\n      <strong style=\"color:var(--ink2);\">Navigation rules:<\u002Fstrong>\n      Session persists until explicit sign-out. The sidebar is always visible post-login. Clicking a client from the Dashboard card grid also opens the Client detail view, defaulting to the Flow builder tab. Back arrow (←) in the client header returns to Clients list.\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══════════════════════════════════════════════\n     SCREEN 1 — LOGIN\n══════════════════════════════════════════════ -->\n<div class=\"section\">\n  <div class=\"section-label\">Screen 1<\u002Fdiv>\n  <div class=\"screen-block\">\n    <div class=\"screen-header\">\n      <div class=\"screen-num\">1<\u002Fdiv>\n      <div class=\"screen-title-wrap\">\n        <h3>Login<\u002Fh3>\n        <div class=\"desc\">Single-account product owner sign-in. No public registration. No password reset in v1.<\u002Fdiv>\n        <div class=\"fr-row\"><span class=\"fr\">FR-01<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"screen-body\" style=\"grid-template-columns:1fr 1.2fr;gap:24px;\">\n      <div class=\"ss-wrap\">\n        <img src=\"a12c1919-80dc-4b56-9e5a-35a96e12d73b\" alt=\"Login screen\">\n        <div class=\"ss-caption\">Login — centred card, full-viewport grey background<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"annotations\">\n        <div class=\"anno\">\n          <div class=\"anno-head\"><div class=\"anno-dot\">1<\u002Fdiv><span class=\"anno-label\">Layout<\u002Fspan><\u002Fdiv>\n          <div class=\"anno-body\">Full-viewport centred card on neutral <code>#f4f5f7<\u002Fcode> background. Card is 360px wide. Logo + wordmark above card. HTTPS-only notice below.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anno\">\n          <div class=\"anno-head\"><div class=\"anno-dot\">2<\u002Fdiv><span class=\"anno-label\">Fields<\u002Fspan><\u002Fdiv>\n          <div class=\"anno-body\">Email + Password. Both required. Submit on Enter or button click. No client-side validation needed beyond \"non-empty\" — server handles credential check.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anno\">\n          <div class=\"anno-head\"><div class=\"anno-dot warn\">3<\u002Fdiv><span class=\"anno-label\">Error state<\u002Fspan><\u002Fdiv>\n          <div class=\"anno-body\">On bad credentials: red border on both fields + inline error text beneath the form. Button re-enables immediately after error. No lockout in v1.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anno\">\n          <div class=\"anno-head\"><div class=\"anno-dot neutral\">4<\u002Fdiv><span class=\"anno-label\">Loading state<\u002Fspan><\u002Fdiv>\n          <div class=\"anno-body\">Button shows a spinner and becomes disabled on submit. Re-enables on error or redirect.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anno\">\n          <div class=\"anno-head\"><div class=\"anno-dot ok\">5<\u002Fdiv><span class=\"anno-label\">On success<\u002Fspan><\u002Fdiv>\n          <div class=\"anno-body\">Redirect to Dashboard. Session cookie / JWT persisted so refresh keeps the user logged in.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══════════════════════════════════════════════\n     SCREEN 2 — DASHBOARD\n══════════════════════════════════════════════ -->\n<div class=\"section\">\n  <div class=\"section-label\">Screen 2<\u002Fdiv>\n  <div class=\"screen-block\">\n    <div class=\"screen-header\">\n      <div class=\"screen-num\">2<\u002Fdiv>\n      <div class=\"screen-title-wrap\">\n        <h3>Dashboard<\u002Fh3>\n        <div class=\"desc\">Platform overview. At-a-glance stats, a \"how it works\" explainer, and client cards. Entry point for navigating to a client.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"screen-body wide\">\n      <div class=\"ss-wrap\">\n        <img src=\"24d82d04-9522-4eca-a3c2-44ab05d2c3d5\" alt=\"Dashboard\">\n        <div class=\"ss-caption\">Dashboard — stat grid + client cards<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"annotations\">\n        <div class=\"anno\">\n          <div class=\"anno-head\"><div class=\"anno-dot\">A<\u002Fdiv><span class=\"anno-label\">App shell<\u002Fspan><\u002Fdiv>\n          <div class=\"anno-body\">Persistent across all post-login screens: <ul><li>Top bar: logo + breadcrumb + account info<\u002Fli><li>Left sidebar (218px): Dashboard, Clients nav + live/total hint<\u002Fli><li>Main content area (scrollable)<\u002Fli><\u002Ful><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anno\">\n          <div class=\"anno-head\"><div class=\"anno-dot\">B<\u002Fdiv><span class=\"anno-label\">Stat tiles<\u002Fspan><\u002Fdiv>\n          <div class=\"anno-body\">4-column grid. Values: active/total clients, total conversations, human handoffs, channel split (WA · IG). All computed from session data — no separate API call needed in v1.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anno\">\n          <div class=\"anno-head\"><div class=\"anno-dot\">C<\u002Fdiv><span class=\"anno-label\">Client cards<\u002Fspan><\u002Fdiv>\n          <div class=\"anno-body\">Auto-fill responsive grid. Each card shows: emoji, name, phone number, Live/Inactive badge, step count, chat count, handoff status. Entire card is clickable → opens Client detail (Flow builder tab by default).<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anno\">\n          <div class=\"anno-head\"><div class=\"anno-dot neutral\">D<\u002Fdiv><span class=\"anno-label\">Empty state<\u002Fspan><\u002Fdiv>\n          <div class=\"anno-body\">If no clients exist: replace card grid with a centred empty state — icon, \"No clients yet\", CTA button → opens Create client modal.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══════════════════════════════════════════════\n     SCREEN 3 — CLIENTS LIST\n══════════════════════════════════════════════ -->\n<div class=\"section\">\n  <div class=\"section-label\">Screen 3<\u002Fdiv>\n  <div class=\"screen-block\">\n    <div class=\"screen-header\">\n      <div class=\"screen-num\">3<\u002Fdiv>\n      <div class=\"screen-title-wrap\">\n        <h3>Clients list <span class=\"fr\">FR-15<\u002Fspan><\u002Fh3>\n        <div class=\"desc\">Table of all tenants. Primary management surface. \"New client\" button opens the create modal.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"screen-body wide\">\n      <div class=\"ss-wrap\">\n        <img src=\"e6152969-35e2-454e-a617-538b23cf4bac\" alt=\"Clients list\">\n        <div class=\"ss-caption\">Clients list — sortable table rows, status badges<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"annotations\">\n        <div class=\"anno\">\n          <div class=\"anno-head\"><div class=\"anno-dot\">A<\u002Fdiv><span class=\"anno-label\">Table columns<\u002Fspan><\u002Fdiv>\n          <div class=\"anno-body\">Business (emoji + name) · WhatsApp number · Instagram account · Handoff (Email badge / Off) · Flow (N steps chip) · Status (Live / Inactive). Chevron (›) at row end indicates clickability.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anno\">\n          <div class=\"anno-head\"><div class=\"anno-dot\">B<\u002Fdiv><span class=\"anno-label\">Row interaction<\u002Fspan><\u002Fdiv>\n          <div class=\"anno-body\">Clicking any cell of a row navigates to Client detail → defaults to Flow builder tab. Hover background tint: <code>var(--surface-2)<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anno\">\n          <div class=\"anno-head\"><div class=\"anno-dot\">C<\u002Fdiv><span class=\"anno-label\">New client button<\u002Fspan><\u002Fdiv>\n          <div class=\"anno-body\">Primary button top-right. Opens the Create client modal (see below). Creates an isolated tenant with a minimal starter flow — no redeployment needed.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anno\">\n          <div class=\"anno-head\"><div class=\"anno-dot neutral\">D<\u002Fdiv><span class=\"anno-label\">Empty state<\u002Fspan><\u002Fdiv>\n          <div class=\"anno-body\">Empty table body shows: \"No clients yet — add your first one\" with a centred CTA.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══════════════════════════════════════════════\n     SCREEN 3b — CREATE CLIENT MODAL\n══════════════════════════════════════════════ -->\n<div class=\"section\">\n  <div class=\"section-label\">Screen 3b — modal<\u002Fdiv>\n  <div class=\"screen-block\">\n    <div class=\"screen-header\">\n      <div class=\"screen-num\" style=\"background:var(--ink2);\">3b<\u002Fdiv>\n      <div class=\"screen-title-wrap\">\n        <h3>Create client modal <span class=\"fr\">FR-16<\u002Fspan><\u002Fh3>\n        <div class=\"desc\">Appears over the Clients list. Centred, scrim behind. Dismissable by clicking scrim or Cancel. Create button disabled until Business name has ≥ 2 chars.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card\" style=\"margin-bottom:18px;\">\n      <h4 style=\"margin-top:0;\">Modal anatomy<\u002Fh4>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;\">\n        <div>\n          <div style=\"font-size:13px;font-weight:700;margin-bottom:10px;\">Fields<\u002Fdiv>\n          <div class=\"comp-row\"><div class=\"comp-name\">Business name<\u002Fdiv><div class=\"comp-detail\">Required, ≥ 2 chars. Used for greeting auto-fill: <code>\"Hi 👋 Thanks for messaging {name}!\"<\u002Fcode><\u002Fdiv><\u002Fdiv>\n          <div class=\"comp-row\"><div class=\"comp-name\">WhatsApp number<\u002Fdiv><div class=\"comp-detail\">Optional at creation. E.164 format validated on save. Displayed in table.<\u002Fdiv><\u002Fdiv>\n          <div class=\"comp-row\"><div class=\"comp-name\">Instagram account<\u002Fdiv><div class=\"comp-detail\">Optional. Validated as <code>@handle<\u002Fcode> pattern.<\u002Fdiv><\u002Fdiv>\n          <div class=\"comp-row\"><div class=\"comp-name\">Handoff email<\u002Fdiv><div class=\"comp-detail\">Optional. If provided, <code>handoff_enabled<\u002Fcode> defaults to <code>true<\u002Fcode>.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:13px;font-weight:700;margin-bottom:10px;\">On create<\u002Fdiv>\n          <ul style=\"font-size:13px;color:var(--ink2);line-height:1.8;padding-left:16px;\">\n            <li>Tenant created with <code>is_active = false<\u002Fcode><\u002Fli>\n            <li>Starter flow injected: 1 step, 2 placeholder buttons<\u002Fli>\n            <li>Greeting + closing auto-filled from business name<\u002Fli>\n            <li>Modal closes; navigates to Client detail → Flow builder tab<\u002Fli>\n            <li>Toast: \"Client created\"<\u002Fli>\n          <\u002Ful>\n          <div style=\"margin-top:14px;font-size:13px;font-weight:700;margin-bottom:6px;\">Dismiss<\u002Fdiv>\n          <p style=\"font-size:13px;\">Clicking scrim or Cancel closes without saving. No confirmation needed (nothing was committed).<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══════════════════════════════════════════════\n     SCREEN 4 — CLIENT SETTINGS\n══════════════════════════════════════════════ -->\n<div class=\"section\">\n  <div class=\"section-label\">Screen 4<\u002Fdiv>\n  <div class=\"screen-block\">\n    <div class=\"screen-header\">\n      <div class=\"screen-num\">4<\u002Fdiv>\n      <div class=\"screen-title-wrap\">\n        <h3>Client settings tab <span class=\"fr\">FR-05<\u002Fspan> <span class=\"fr\">FR-11<\u002Fspan> <span class=\"fr\">FR-12<\u002Fspan><\u002Fh3>\n        <div class=\"desc\">Per-tenant configuration. Three sections: Messages, Human handoff, Channels &amp; identity. Auto-save on blur (or explicit Save button — choose one).<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"screen-body wide\">\n      <div class=\"ss-wrap\">\n        <img src=\"63c683a3-ea97-4c49-931c-bebcf70eb37d\" alt=\"Client settings\">\n        <div class=\"ss-caption\">Settings tab — messages, handoff toggle, channel identity<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"annotations\">\n        <div class=\"anno\">\n          <div class=\"anno-head\"><div class=\"anno-dot\">A<\u002Fdiv><span class=\"anno-label\">Greeting message<\u002Fspan><\u002Fdiv>\n          <div class=\"anno-body\"><span class=\"fr\">FR-05<\u002Fspan> Sent to the customer immediately on first contact, before the flow start step. Free text, no length limit but recommended ≤ 160 chars for WhatsApp rendering. Supports emoji.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anno\">\n          <div class=\"anno-head\"><div class=\"anno-dot\">B<\u002Fdiv><span class=\"anno-label\">Closing message<\u002Fspan><\u002Fdiv>\n          <div class=\"anno-body\"><span class=\"fr\">FR-12<\u002Fspan> Shown only when the flow reaches a terminal step <em>and<\u002Fem> handoff is disabled. If handoff is on, this field is still editable but inactive — show a muted note: \"Only sent when handoff is off.\"<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anno\">\n          <div class=\"anno-head\"><div class=\"anno-dot\">C<\u002Fdiv><span class=\"anno-label\">Handoff toggle<\u002Fspan><\u002Fdiv>\n          <div class=\"anno-body\"><span class=\"fr\">FR-11<\u002Fspan> Toggle switch. When on: reveals the handoff email input. When off: hides it. Toggling live updates the preview (if shown). Turning on without an email → show inline warning: \"Add a handoff email to enable this.\"<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anno\">\n          <div class=\"anno-head\"><div class=\"anno-dot\">D<\u002Fdiv><span class=\"anno-label\">Channels &amp; identity<\u002Fspan><\u002Fdiv>\n          <div class=\"anno-body\">Business name, WhatsApp number, Instagram account. Status badge (Active/Inactive) is read-only here — controlled by the \"Activate flow\" button in Flow builder. Channel connection status shown as green badges.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══════════════════════════════════════════════\n     SCREEN 5 — FLOW BUILDER\n══════════════════════════════════════════════ -->\n<div class=\"section\">\n  <div class=\"section-label\">Screen 5 — most important<\u002Fdiv>\n  <div class=\"screen-block\">\n    <div class=\"screen-header\">\n      <div class=\"screen-num\" style=\"background: oklch(0.52 0.14 256);\">5<\u002Fdiv>\n      <div class=\"screen-title-wrap\">\n        <h3>Flow builder <span class=\"fr\">FR-17<\u002Fspan><\u002Fh3>\n        <div class=\"desc\">The core authoring surface. Step list with inline expand-to-edit. Each step = one bot message + N button options, each linking to the next step or ending the flow.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Collapsed view -->\n    <div style=\"margin-bottom:28px;\">\n      <h4 style=\"margin-top:0;\">5a — Collapsed view (browse mode)<\u002Fh4>\n      <div class=\"screen-body wide\">\n        <div class=\"ss-wrap\">\n          <img src=\"d318acc0-987b-47f8-8898-073ea6f50b98\" alt=\"Flow builder collapsed\">\n          <div class=\"ss-caption\">Flow builder — all steps collapsed, valid flow, Active badge<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"annotations\">\n          <div class=\"anno\">\n            <div class=\"anno-head\"><div class=\"anno-dot ok\">✓<\u002Fdiv><span class=\"anno-label\">Validation banner<\u002Fspan><\u002Fdiv>\n            <div class=\"anno-body\">Top bar shows flow health: green \"Flow valid\" badge + plain-text confirmation when all checks pass. Red \"N issues\" badge + error list below when checks fail. Activate/Deactivate button at right — <strong>disabled when flow is invalid and inactive<\u002Fstrong>.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"anno\">\n            <div class=\"anno-head\"><div class=\"anno-dot\">A<\u002Fdiv><span class=\"anno-label\">Step card (collapsed)<\u002Fspan><\u002Fdiv>\n            <div class=\"anno-body\">Shows: monospace step ID, step label, START / END badge if applicable, option count chip, option map (button label → target step name). Clicking anywhere on the header expands to edit mode.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"anno\">\n            <div class=\"anno-head\"><div class=\"anno-dot\">B<\u002Fdiv><span class=\"anno-label\">Option map<\u002Fspan><\u002Fdiv>\n            <div class=\"anno-body\">Visible when collapsed. Each row: <code>[Button label chip] › [Target step name]<\u002Fcode> or <em>\"End flow\"<\u002Fem> in italic. Gives the owner a quick read of the branching logic without opening the editor.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"anno\">\n            <div class=\"anno-head\"><div class=\"anno-dot neutral\">C<\u002Fdiv><span class=\"anno-label\">Add step<\u002Fspan><\u002Fdiv>\n            <div class=\"anno-body\">Ghost button below the step list. Creates a new step with a placeholder message, no options, not marked as start. Automatically opens in edit mode.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Expanded view -->\n    <div style=\"margin-bottom:28px;\">\n      <h4>5b — Expanded / edit mode (one step open at a time)<\u002Fh4>\n      <div class=\"screen-body wide\">\n        <div class=\"ss-wrap\">\n          <img src=\"7b6615c7-b93e-438c-b0c2-eedb8633ad90\" alt=\"Flow builder step expanded\">\n          <div class=\"ss-caption\">Step editor — name, message, start toggle, buttons with targets<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"annotations\">\n          <div class=\"anno\">\n            <div class=\"anno-head\"><div class=\"anno-dot\">A<\u002Fdiv><span class=\"anno-label\">Step name<\u002Fspan><\u002Fdiv>\n            <div class=\"anno-body\">Internal label, not shown to customers. Any string. Used in the option map targets of other steps.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"anno\">\n            <div class=\"anno-head\"><div class=\"anno-dot\">B<\u002Fdiv><span class=\"anno-label\">Message text<\u002Fspan><\u002Fdiv>\n            <div class=\"anno-body\">Sent to the customer when this step is reached. Free text, supports emoji. WhatsApp recommends ≤ 1024 chars; show character count if over 800.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"anno\">\n            <div class=\"anno-head\"><div class=\"anno-dot\">C<\u002Fdiv><span class=\"anno-label\">Start step toggle<\u002Fspan><\u002Fdiv>\n            <div class=\"anno-body\">Exactly one step must be the start. Toggling ON automatically toggles OFF any previously marked start step — no multi-select. Toggling OFF the only start step → validation error immediately.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"anno\">\n            <div class=\"anno-head\"><div class=\"anno-dot\">D<\u002Fdiv><span class=\"anno-label\">Button / option rows<\u002Fspan><\u002Fdiv>\n            <div class=\"anno-body\">Each row: <code>[Label input 20/20] › [Target step select] [🗑]<\u002Fcode>. Label max 20 chars — counter shown. Target dropdown lists all other steps + \"⏹ End flow\". \"Add option\" button appends a new row.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"anno\">\n            <div class=\"anno-head\"><div class=\"anno-dot warn\">!<\u002Fdiv><span class=\"anno-label\">&gt; 3 options warning<\u002Fspan><\u002Fdiv>\n            <div class=\"anno-body\">WhatsApp supports max 3 interactive buttons in a single message. If a step has 4+ options, show inline warning: \"4+ options → sent as a list message.\" Still allowed — just flagged.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"anno\">\n            <div class=\"anno-head\"><div class=\"anno-dot danger\">✕<\u002Fdiv><span class=\"anno-label\">Delete step<\u002Fspan><\u002Fdiv>\n            <div class=\"anno-body\">Red \"Delete step\" button at bottom-left of edit panel. No modal confirmation — but any other steps whose options pointed to this step have their <code>next<\u002Fcode> set to <code>null<\u002Fcode> (End flow). This may create new validation errors — shown immediately.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Interaction table -->\n    <h4>5c — Flow builder interactions (complete reference)<\u002Fh4>\n    <div class=\"card\" style=\"padding:0;overflow:hidden;\">\n      <table class=\"ix-table\">\n        <thead><tr><th>User action<\u002Fth><th>Result<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td class=\"action\">Click collapsed step header<\u002Ftd><td class=\"result\">Expands that step into edit mode. If another step was open, it closes (only one step open at a time). No unsaved-changes warning — changes are applied immediately on each keystroke (live save).<\u002Ftd><\u002Ftr>\n          <tr><td class=\"action\">Edit step name / message<\u002Ftd><td class=\"result\">Live-updates the collapsed card preview. Flow validation re-runs on every change.<\u002Ftd><\u002Ftr>\n          <tr><td class=\"action\">Toggle \"Start step\" ON<\u002Ftd><td class=\"result\">Previous start step is un-marked. Badge updates. Validation re-runs.<\u002Ftd><\u002Ftr>\n          <tr><td class=\"action\">Type in button label<\u002Ftd><td class=\"result\">Character counter updates. At 20 chars, input is capped (no overflow allowed). Counter turns red.<\u002Ftd><\u002Ftr>\n          <tr><td class=\"action\">Select target step in dropdown<\u002Ftd><td class=\"result\">Option map in collapsed view updates immediately. Validation re-runs (may clear a broken-link error).<\u002Ftd><\u002Ftr>\n          <tr><td class=\"action\">Click \"Add option\"<\u002Ftd><td class=\"result\">New row appended: empty label, target = \"End flow\". Focused on label input.<\u002Ftd><\u002Ftr>\n          <tr><td class=\"action\">Click 🗑 on option row<\u002Ftd><td class=\"result\">Row removed. Validation re-runs.<\u002Ftd><\u002Ftr>\n          <tr><td class=\"action\">Click \"Delete step\"<\u002Ftd><td class=\"result\">Step removed. Broken incoming links set to \"End flow\". Validation re-runs. Edit panel closes.<\u002Ftd><\u002Ftr>\n          <tr><td class=\"action\">Click \"Add step\" (footer)<\u002Ftd><td class=\"result\">New step appended; immediately opened in edit mode.<\u002Ftd><\u002Ftr>\n          <tr><td class=\"action\">Click \"Activate flow\" (valid flow)<\u002Ftd><td class=\"result\">Sets <code>is_active = true<\u002Fcode>. Status badge updates to Live. Button changes to \"Deactivate flow\".<\u002Ftd><\u002Ftr>\n          <tr><td class=\"action\">Click \"Activate flow\" (invalid)<\u002Ftd><td class=\"result\">Button is disabled — not clickable. Validation errors remain visible above.<\u002Ftd><\u002Ftr>\n          <tr><td class=\"action\">Click \"Deactivate flow\"<\u002Ftd><td class=\"result\">Sets <code>is_active = false<\u002Fcode>. Always allowed regardless of validation state.<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <!-- Validation rules -->\n    <h4 style=\"margin-top:28px;\">5d — Validation rules (blocks activation)<\u002Fh4>\n    <div class=\"card\" style=\"padding:0;overflow:hidden;\">\n      <table class=\"rule-table\">\n        <thead><tr><th>Rule ID<\u002Fth><th>Name<\u002Fth><th>Condition that triggers the error<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>V-01<\u002Ftd><td>No start step<\u002Ftd><td>Zero steps have <code>isStart = true<\u002Fcode>. Cannot activate or even send a greeting.<\u002Ftd><\u002Ftr>\n          <tr><td>V-02<\u002Ftd><td>Multiple start steps<\u002Ftd><td>More than one step has <code>isStart = true<\u002Fcode>. Should never occur if toggle logic is correct; guard against it anyway.<\u002Ftd><\u002Ftr>\n          <tr><td>V-03<\u002Ftd><td>Broken link<\u002Ftd><td>An option's <code>next<\u002Fcode> references a step ID that no longer exists (e.g. step was deleted after the link was made).<\u002Ftd><\u002Ftr>\n          <tr><td>V-04<\u002Ftd><td>Unreachable step<\u002Ftd><td>A step exists but no path from the start step can reach it. It will never be shown to a customer. Still saves; just can't activate.<\u002Ftd><\u002Ftr>\n          <tr><td>V-05 (soft)<\u002Ftd><td>Button label too long<\u002Ftd><td>Label &gt; 20 chars — input is hard-capped at 20 so this only fires if data was injected. Show as warning, not a blocker.<\u002Ftd><\u002Ftr>\n          <tr><td>V-06 (soft)<\u002Ftd><td>Too many buttons<\u002Ftd><td>&gt; 3 options on a step — sent as list message instead of buttons. Warn inline on the step, don't block activation.<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══════════════════════════════════════════════\n     SCREEN 6 — CONVERSATION LOGS\n══════════════════════════════════════════════ -->\n<div class=\"section\">\n  <div class=\"section-label\">Screen 6<\u002Fdiv>\n  <div class=\"screen-block\">\n    <div class=\"screen-header\">\n      <div class=\"screen-num\">6<\u002Fdiv>\n      <div class=\"screen-title-wrap\">\n        <h3>Conversation log viewer <span class=\"fr\">FR-18<\u002Fspan><\u002Fh3>\n        <div class=\"desc\">Per-client read-only log. Each row is one conversation session: channel badge, customer identifier, path taken, timestamp, status.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"screen-body wide\">\n      <div class=\"ss-wrap\">\n        <img src=\"dceab18c-c8e9-4301-aa5e-06dcf84c3d06\" alt=\"Conversation logs\">\n        <div class=\"ss-caption\">Conversations tab — session list with expandable message thread<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"annotations\">\n        <div class=\"anno\">\n          <div class=\"anno-head\"><div class=\"anno-dot\">A<\u002Fdiv><span class=\"anno-label\">Session row<\u002Fspan><\u002Fdiv>\n          <div class=\"anno-body\">Channel badge (WA green / IG purple) · Customer ID (phone or @handle) · Path trail (button labels joined by ›) · Timestamp · Status badge. Sorted newest-first.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anno\">\n          <div class=\"anno-head\"><div class=\"anno-dot\">B<\u002Fdiv><span class=\"anno-label\">Expand to see thread<\u002Fspan><\u002Fdiv>\n          <div class=\"anno-body\">Clicking a row expands an inline message thread. Bot messages left-aligned, customer messages right-aligned. System events (e.g. \"📧 Handoff email sent\") centred in a pill. Closes on re-click.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anno\">\n          <div class=\"anno-head\"><div class=\"anno-dot ok\">C<\u002Fdiv><span class=\"anno-label\">Status badges<\u002Fspan><\u002Fdiv>\n          <div class=\"anno-body\">\n            <div class=\"states\">\n              <div class=\"state\"><div class=\"dot\" style=\"background:var(--ok)\"><\u002Fdiv><div><div class=\"name\" style=\"font-size:12px;\">Completed<\u002Fdiv><div class=\"desc\">Flow reached end + closing sent<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n              <div class=\"state\"><div class=\"dot\" style=\"background:var(--warn)\"><\u002Fdiv><div><div class=\"name\" style=\"font-size:12px;\">Handed off<\u002Fdiv><div class=\"desc\">Human notified; bot stopped<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n              <div class=\"state\"><div class=\"dot\" style=\"background:var(--accent)\"><\u002Fdiv><div><div class=\"name\" style=\"font-size:12px;\">Active<\u002Fdiv><div class=\"desc\">Conversation in progress<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anno\">\n          <div class=\"anno-head\"><div class=\"anno-dot neutral\">D<\u002Fdiv><span class=\"anno-label\">Empty state<\u002Fspan><\u002Fdiv>\n          <div class=\"anno-body\">No conversations yet: \"No conversations logged yet — run the flow to see logs here.\" No filter / search in v1.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══════════════════════════════════════════════\n     GLOBAL STATES\n══════════════════════════════════════════════ -->\n<div class=\"section\">\n  <div class=\"section-label\">Global patterns<\u002Fdiv>\n  <h2 style=\"margin-bottom:16px;\">States &amp; feedback patterns<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;\">\n    <div class=\"card\">\n      <h4 style=\"margin-top:0;\">Toast notifications<\u002Fh4>\n      <p style=\"font-size:13px;\">Bottom-centre toasts for async confirmations. Auto-dismiss after 2.6s. Dark pill with check icon. Used for: \"Client created\", \"Conversation logged\", \"Handoff email sent\".<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <h4 style=\"margin-top:0;\">Loading states<\u002Fh4>\n      <p style=\"font-size:13px;\">Button spinner (replace icon + text with spinner, disable button). Skeleton rows for table/list loads. No full-page spinners except initial auth check.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <h4 style=\"margin-top:0;\">Empty states<\u002Fh4>\n      <p style=\"font-size:13px;\">Each list / table has a centred empty state with an icon, one-line label, and a CTA where applicable (e.g. \"Add your first client\"). No blank boxes.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <h4 style=\"margin-top:0;\">Inline validation (flow builder)<\u002Fh4>\n      <p style=\"font-size:13px;\">Validation runs on every change — no explicit \"Validate\" button. Errors surface as a red card above the step list and a red badge in the top banner. Errors clear automatically when resolved.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══════════════════════════════════════════════\n     DESIGN TOKENS QUICK-REF\n══════════════════════════════════════════════ -->\n<div class=\"section\">\n  <div class=\"section-label\">Design tokens<\u002Fdiv>\n  <h2 style=\"margin-bottom:16px;\">Colours, type &amp; spacing<\u002Fh2>\n  <div class=\"card\" style=\"padding:0;overflow:hidden;\">\n    <table class=\"rule-table\">\n      <thead><tr><th>Token<\u002Fth><th>Value<\u002Fth><th>Usage<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td>--accent<\u002Ftd><td><code>oklch(0.52 0.13 256)<\u002Fcode><\u002Ftd><td>Primary buttons, active nav, badges, focus rings<\u002Ftd><\u002Ftr>\n        <tr><td>--accent-weak<\u002Ftd><td><code>oklch(0.96 0.025 256)<\u002Fcode><\u002Ftd><td>Active nav background, badge backgrounds<\u002Ftd><\u002Ftr>\n        <tr><td>--bg<\u002Ftd><td><code>#f4f5f7<\u002Fcode><\u002Ftd><td>Page background, alternating table rows<\u002Ftd><\u002Ftr>\n        <tr><td>--surface<\u002Ftd><td><code>#ffffff<\u002Fcode><\u002Ftd><td>Cards, sidebar, modal<\u002Ftd><\u002Ftr>\n        <tr><td>--border<\u002Ftd><td><code>#e6e8ed<\u002Fcode><\u002Ftd><td>Card borders, table lines, dividers<\u002Ftd><\u002Ftr>\n        <tr><td>--text / --ink<\u002Ftd><td><code>#1b1f26<\u002Fcode><\u002Ftd><td>Primary text<\u002Ftd><\u002Ftr>\n        <tr><td>--text-2 / --ink2<\u002Ftd><td><code>#52596a<\u002Fcode><\u002Ftd><td>Secondary / label text<\u002Ftd><\u002Ftr>\n        <tr><td>--text-3 / --ink3<\u002Ftd><td><code>#8b93a1<\u002Fcode><\u002Ftd><td>Muted, placeholders, section labels<\u002Ftd><\u002Ftr>\n        <tr><td>--ok<\u002Ftd><td><code>oklch(0.42 0.10 155)<\u002Fcode><\u002Ftd><td>Active/Live/Completed green badges<\u002Ftd><\u002Ftr>\n        <tr><td>--warn<\u002Ftd><td><code>oklch(0.50 0.12 70)<\u002Fcode><\u002Ftd><td>Handoff/warning amber badges<\u002Ftd><\u002Ftr>\n        <tr><td>--danger<\u002Ftd><td><code>oklch(0.46 0.14 25)<\u002Fcode><\u002Ftd><td>Validation errors, delete actions<\u002Ftd><\u002Ftr>\n        <tr><td>Font — UI<\u002Ftd><td><code>Plus Jakarta Sans<\u002Fcode><\u002Ftd><td>400/600/700/800 weights throughout<\u002Ftd><\u002Ftr>\n        <tr><td>Font — mono<\u002Ftd><td><code>JetBrains Mono<\u002Fcode><\u002Ftd><td>Step IDs, phone numbers, code snippets<\u002Ftd><\u002Ftr>\n        <tr><td>--radius<\u002Ftd><td><code>11px<\u002Fcode><\u002Ftd><td>Cards, modals, inputs<\u002Ftd><\u002Ftr>\n        <tr><td>--radius-sm<\u002Ftd><td><code>7px<\u002Fcode><\u002Ftd><td>Buttons, small chips<\u002Ftd><\u002Ftr>\n        <tr><td>--radius-lg<\u002Ftd><td><code>16px<\u002Fcode><\u002Ftd><td>Modal container, large cards<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ══════════════════════════════════════════════\n     FOOTER\n══════════════════════════════════════════════ -->\n<div class=\"footer\">\n  <span><strong>Relay Admin Panel<\u002Fstrong> · Frontend Handoff v1.0<\u002Fspan>\n  <span>June 8, 2026<\u002Fspan>\n  <span>Companion prototype: <code>index.html<\u002Fcode> — interactive, runs real flows<\u002Fspan>\n  <span style=\"margin-left:auto;\"><strong>Tickets covered:<\u002Fstrong> FR-01 · FR-05 · FR-11 · FR-12 · FR-15 · FR-16 · FR-17 · FR-18<\u002Fspan>\n<\u002Fdiv>\n\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
